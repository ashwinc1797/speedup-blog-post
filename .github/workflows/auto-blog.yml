name: Auto Blog Publisher

on:
  schedule:
    - cron: "30 0 * * 1,2,4,6"   # Mon, Tue, Thu, Sat — 6:00 AM IST (4 posts/week)
  workflow_dispatch:               # Manual trigger from GitHub UI

jobs:
  publish:
    name: Research Keywords & Publish Post
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.GROQ_API_KEY }}" ]; then
            echo "❌ ERROR: GROQ_API_KEY secret is not set!"
            echo "Go to: GitHub repo → Settings → Secrets → Actions → New secret"
            echo "Get your free key at: https://console.groq.com"
            exit 1
          fi
          echo "✅ GROQ_API_KEY is set"
          echo "✅ PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY != '' && 'set' || 'not set (optional)' }}"
          echo "✅ UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY != '' && 'set' || 'not set (optional)' }}"

      - name: Run automation
        id: blog
        env:
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_2:      ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3:      ${{ secrets.GROQ_API_KEY_3 }}
          PEXELS_API_KEY:      ${{ secrets.PEXELS_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          INDEXNOW_KEY:        ${{ secrets.INDEXNOW_KEY }}
        run: |
          set -e
          # Count existing MDX files BEFORE running
          MDX_COUNT_BEFORE=$(ls content/blog/*.mdx 2>/dev/null | wc -l || echo 0)
          echo "📂 MDX files before: $MDX_COUNT_BEFORE"

          node scripts/automate.js 2>&1 | tee output.log
          node scripts/sync-sitemap.js

          # Check if the script exited with error
          if grep -q "✗ Fatal:" output.log; then
            echo "❌ ERROR: Script failed! See error above."
            cat output.log | grep "✗ Fatal:"
            exit 1
          fi

          # Check if a NEW MDX file was actually created
          MDX_COUNT_AFTER=$(ls content/blog/*.mdx 2>/dev/null | wc -l || echo 0)
          echo "📂 MDX files after: $MDX_COUNT_AFTER"
          if [ "$MDX_COUNT_AFTER" -le "$MDX_COUNT_BEFORE" ]; then
            echo "❌ ERROR: No NEW MDX file was generated! Script may have failed silently."
            exit 1
          fi
          echo "✅ New MDX file generated successfully ($MDX_COUNT_BEFORE → $MDX_COUNT_AFTER files)"

          # Extract post title and slug from log
          TITLE=$(grep "Selected:" output.log | sed 's/.*Selected: "//' | sed 's/".*//' || echo "New Blog Post")
          SLUG=$(grep "content/blog/" output.log | head -1 | sed 's/.*content\/blog\///' | sed 's/\.mdx.*//' || echo "")
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: Push content to GitHub
        run: |
          git config user.name  "SpeedUp Blog Bot"
          git config user.email "bot@speedupinfotech.com"
          git add content/blog/ public/sitemap.xml public/images/ scripts/.state.json scripts/social-queue/ || true
          if git diff --cached --quiet; then
            echo "No new content to commit"
          else
            git commit -m "Auto-publish blog [$(date +'%Y-%m-%d')]"

            # Retry push up to 3 times, rebasing on top of any remote commits
            # that arrived while the workflow was running (prevents non-fast-forward).
            for i in 1 2 3; do
              echo "Push attempt $i/3..."
              git fetch origin master
              git rebase origin/master
              if git push origin master; then
                echo "PUSHED=true" >> $GITHUB_ENV
                break
              fi
              echo "Push attempt $i failed, retrying..."
              sleep 5
            done
          fi

      - name: Send email notification
        if: env.PUSHED == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.NOTIFY_EMAIL }}
          password: ${{ secrets.NOTIFY_EMAIL_PASSWORD }}
          subject: "✅ New Blog Published — SpeedUp Infotech"
          to: ${{ secrets.NOTIFY_EMAILS }}
          from: SpeedUp Blog Bot
          html_body: |
            <div style="font-family:Arial,sans-serif;max-width:600px;margin:0 auto;background:#000;color:#fff;padding:30px;border-radius:8px">
              <div style="text-align:center;margin-bottom:24px">
                <h1 style="font-size:28px;font-weight:900;letter-spacing:2px">
                  <span style="color:#fff">SPEED</span><span style="color:#D92B2B">UP</span>
                  <span style="font-size:12px;letter-spacing:4px;color:#555"> INFOTECH</span>
                </h1>
              </div>
              <div style="background:#111;border-left:4px solid #D92B2B;padding:20px;margin-bottom:20px">
                <h2 style="color:#D92B2B;font-size:14px;text-transform:uppercase;letter-spacing:2px;margin:0 0 8px">New Blog Post Published</h2>
                <h3 style="color:#fff;font-size:20px;margin:0">${{ steps.blog.outputs.title }}</h3>
              </div>
              <table style="width:100%;border-collapse:collapse;margin-bottom:20px">
                <tr>
                  <td style="padding:10px;border-bottom:1px solid #222;color:#888;font-size:13px">Published</td>
                  <td style="padding:10px;border-bottom:1px solid #222;color:#fff;font-size:13px">${{ github.run_started_at }}</td>
                </tr>
                <tr>
                   <td style="padding:10px;color:#888;font-size:13px">Schedule</td>
                   <td style="padding:10px;color:#fff;font-size:13px">Mon / Tue / Thu / Sat · 6:00 AM IST</td>
                 </tr>
              </table>
              <div style="text-align:center;margin-bottom:20px">
                <a href="https://speedupinfotech.com/blog/${{ steps.blog.outputs.slug }}"
                   style="background:#D92B2B;color:#fff;padding:12px 28px;text-decoration:none;font-weight:bold;font-size:14px;letter-spacing:1px;text-transform:uppercase">
                  VIEW BLOG POST →
                </a>
              </div>
              <div style="text-align:center;margin-top:20px">
                <a href="https://github.com/${{ github.repository }}/actions"
                   style="color:#555;font-size:12px;text-decoration:none">
                  View GitHub Actions →
                </a>
              </div>
              <p style="color:#333;font-size:11px;text-align:center;margin-top:20px">
                SpeedUp Infotech · Shivaji Nagar, FC Road, Pune · +91-8904581086
              </p>
            </div>

      - name: Notify on failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.NOTIFY_EMAIL }}
          password: ${{ secrets.NOTIFY_EMAIL_PASSWORD }}
          subject: "❌ Blog Automation Failed — SpeedUp Infotech"
          to: ${{ secrets.NOTIFY_EMAILS }}
          from: SpeedUp Blog Bot
          body: |
            Blog automation failed on ${{ github.run_started_at }}
            
            Check the logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            SpeedUp Infotech Blog Bot
